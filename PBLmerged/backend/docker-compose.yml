version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: assessment-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: assessment_db
    ports:
      - "5432:5432"
    volumes:
      - assessment_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d assessment_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  assessment_pg_data:
